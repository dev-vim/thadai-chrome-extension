<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thadai</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>

  <body>
    <div class="popup-window">
      <p id="popup-heading">Thadai</p>
      <div class="popup-user-inputs-section" id="popup-user-inputs-section">
        <div class="amount-slider-container">
          <div class="amount-usage-hint" id="popup-usage-hint">~24 min (0.0006 ETH)</div>
          <input
            id="popup-amount-slider"
            type="range"
            min="0.000606"
            max="0.015152"
            step="0.000001"
            value="0.000606"
            class="amount-slider"
          />
          <div class="amount-limits">
            <span>$2</span>
            <span>$50</span>
          </div>
        </div>
        <button id="popup-user-deposit-intent-button">
          User Deposit Intent
        </button>
      </div>
    </div>
    <script src="../core-eth/ethers.js"></script>
    <script src="../core-eth/eth-contract-metadata.js"></script>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
