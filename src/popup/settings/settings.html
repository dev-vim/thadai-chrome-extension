<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thadai Settings</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div class="popup-window">
      <div class="popup-header">
        <span id="settings-back-btn" class="icon-btn">&#8592;</span>
        <p id="popup-heading">Settings</p>
      </div>
      <div id="popup-settings-page">
        <div class="settings-tabs">
          <button class="tab-btn active" id="tab-blockchain">Blockchain Settings</button>
          <button class="tab-btn" id="tab-websites">Managed Websites</button>
        </div>
        <div class="tab-content" id="tab-content-blockchain">
          <div class="settings-content">
            <label for="private-key-input" class="settings-label">Private Key</label>
            <input
              type="password"
              id="private-key-input"
              placeholder="Enter private key"
              class="settings-input"
            />

            <label for="chain-name-input" class="settings-label">Chain Name</label>
            <input
              type="text"
              id="chain-name-input"
              placeholder="e.g. Ethereum Mainnet"
              class="settings-input"
            />

            <label for="chain-id-input" class="settings-label">Chain ID</label>
            <input type="number" id="chain-id-input" placeholder="e.g. 1" class="settings-input" />

            <label for="chain-rpc-url-input" class="settings-label">Chain RPC URL</label>
            <input
              type="text"
              id="chain-rpc-url-input"
              placeholder="e.g. https://mainnet.infura.io/v3/xxx"
              class="settings-input"
            />

            <button id="save-settings-btn" class="settings-save-btn">Save Settings</button>
          </div>
        </div>
        <div class="tab-content hidden" id="tab-content-websites">
          <div class="websites-content">
            <label class="settings-label">Blocked Websites</label>
            <ul id="blocked-websites-list" class="websites-list">
              <!-- Example list item: <li>www.facebook.com <button class='remove-website-btn'>Remove</button></li> -->
            </ul>
            <div class="websites-add-row">
              <input
                type="text"
                id="add-website-input"
                class="settings-input"
                placeholder="Add website (e.g. www.example.com)"
              />
              <button id="add-website-btn" class="settings-save-btn">Add</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./settings.js"></script>
  </body>
</html>
